version: 2
updates:
  # Node dependencies (express, ws, qrcode). pnpm-compatible: Dependabot
  # ignores the lockfile entries it can't parse but tracks package.json.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    groups:
      # Group non-major bumps so we get one PR per week rather than three.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions versions (actions/checkout, actions/setup-node, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"

  # Dockerfile base image (node:22-alpine) — track new patch releases.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
